name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.9.0)'
        required: true

jobs:
  build:
    name: Build & Publish
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore FortyOne.AudioSwitcher/FortyOne.AudioSwitcher.GUI.csproj

      - name: Publish AudioSwitcher (single-file)
        run: >
          dotnet publish FortyOne.AudioSwitcher/FortyOne.AudioSwitcher.GUI.csproj
          -c Release
          -r win-x86
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:SignAssembly=false
          -p:GenerateAssemblyInfo=false
          -o publish/AudioSwitcher

      - name: Restore FocusGuard dependencies
        run: dotnet restore FocusGuard/FocusGuard.csproj

      - name: Publish FocusGuard (single-file)
        run: >
          dotnet publish FocusGuard/FocusGuard.csproj
          -c Release
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:GenerateAssemblyInfo=false
          -o publish/FocusGuard

      - name: Upload unsigned artifacts for signing
        id: upload-unsigned
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-exe
          path: |
            publish/AudioSwitcher/AudioSwitcher.exe
            publish/FocusGuard/FocusGuard.exe

      # ---------------------------------------------------------------
      # SignPath Foundation — free OSS code signing
      # Apply at https://signpath.org and install the SignPath GitHub App.
      # Then add the following secret to your repo:
      #   SIGNPATH_API_TOKEN  — API token from your SignPath organization
      # And fill in the three placeholder values below:
      #   <your-organization-id>      — found in SignPath dashboard URL
      #   <your-project-slug>         — slug you chose when creating the project
      #   <your-signing-policy-slug>  — e.g. "release-signing"
      # ---------------------------------------------------------------
      - name: Sign with SignPath Foundation
        uses: signpath/github-action-submit-signing-request@v1
        with:
          api-token: '${{ secrets.SIGNPATH_API_TOKEN }}'
          organization-id: '<your-organization-id>'
          project-slug: '<your-project-slug>'
          signing-policy-slug: '<your-signing-policy-slug>'
          github-artifact-id: '${{ steps.upload-unsigned.outputs.artifact-id }}'
          wait-for-completion: true
          output-artifact-directory: publish/signed

      - name: Replace unsigned exes with signed exes
        shell: pwsh
        run: |
          Copy-Item publish/signed/AudioSwitcher.exe publish/AudioSwitcher/AudioSwitcher.exe -Force
          Copy-Item publish/signed/FocusGuard.exe    publish/FocusGuard/FocusGuard.exe       -Force

      - name: Determine release tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "value=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Zip release artifacts
        shell: pwsh
        run: |
          Compress-Archive -Path publish/AudioSwitcher/* -DestinationPath AudioSwitcher-${{ steps.tag.outputs.value }}-win-x86.zip
          Compress-Archive -Path publish/FocusGuard/*    -DestinationPath FocusGuard-${{ steps.tag.outputs.value }}-win-x64.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.value }}
          name: AudioSwitcher ${{ steps.tag.outputs.value }}
          draft: false
          prerelease: false
          files: |
            AudioSwitcher-${{ steps.tag.outputs.value }}-win-x86.zip
            FocusGuard-${{ steps.tag.outputs.value }}-win-x64.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
